{% extends "admin/admin_base.html" %}
{% block title %}New Page — Admin{% endblock %}

{% block admin_content %}
<h1>New Page</h1>
<p class="meta">Every page uses the same layout — only the content below is edited per page.</p>
<link href="https://cdnjs.cloudflare.com/ajax/libs/quill/1.3.7/quill.snow.css" rel="stylesheet">

<form method="POST" class="admin-form" id="page-form">
  <label>Title</label>
  <input type="text" name="title" required>

  <label>Content</label>
  <div id="editor-container" style="background:var(--bg-alt); min-height:300px;"></div>
  <textarea name="content" id="content-hidden" style="display:none;"></textarea>

  <label>SEO Title</label>
  <input type="text" name="seo_title" placeholder="Defaults to title if left blank">

  <label>SEO Description</label>
  <input type="text" name="seo_description">

  <label class="checkbox-label">
    <input type="checkbox" name="show_in_nav"> Show in main navigation
  </label>

  <button type="submit" class="btn-primary">Save Page</button>
</form>

<script src="https://cdnjs.cloudflare.com/ajax/libs/quill/1.3.7/quill.min.js"></script>
<script>
  const quill = new Quill('#editor-container', {
    theme: 'snow',
    modules: {
      toolbar: {
        container: [
          [{ header: [1, 2, 3, false] }],
          ['bold', 'italic', 'underline', 'strike'],
          ['blockquote', 'code-block'],
          [{ list: 'ordered' }, { list: 'bullet' }],
          ['link', 'image'],
          ['clean']
        ],
        handlers: { image: imageHandler }
      }
    }
  });

  function imageHandler() {
    const input = document.createElement('input');
    input.setAttribute('type', 'file');
    input.setAttribute('accept', 'image/*');
    input.click();

    input.onchange = async () => {
      const file = input.files[0];
      const formData = new FormData();
      formData.append('file', file);

      const res = await fetch("{{ url_for('admin.upload_image') }}", {
        method: 'POST',
        body: formData
      });
      const data = await res.json();
      if (data.url) {
        const range = quill.getSelection(true);
        quill.insertEmbed(range.index, 'image', data.url);
      } else {
        alert(data.error || 'Upload failed');
      }
    };
  }

  document.getElementById('page-form').addEventListener('submit', () => {
    document.getElementById('content-hidden').value = quill.root.innerHTML;
  });
</script>
{% endblock %}
