{% extends "base.html" %}
{% block title %}Login — Clinton Tech{% endblock %}

{% block content %}
<section class="container auth-form">
  <h1>Login</h1>
  <form method="POST">
    <label>Email</label>
    <input type="email" name="email" required>
    <label>Password</label>
    <input type="password" name="password" required>
    <button type="submit" class="btn-primary">Login</button>
  </form>
  <p>No account? <a href="{{ url_for('auth.register') }}">Sign up</a></p>
</section>
{% endblock %}
