{% extends "base.html" %}
{% block title %}#{{ tag.name }} — Clinton Tech{% endblock %}

{% block content %}
<section class="container section">
  <h1>#{{ tag.name }}</h1>
  <div class="card-grid">
    {% for article in articles %}
      <a class="card" href="{{ url_for('main.article_detail', slug=article.slug) }}">
        <h3>{{ article.title }}</h3>
        <p>{{ article.summary }}</p>
      </a>
    {% else %}
      <p class="empty">No articles with this tag yet.</p>
    {% endfor %}
  </div>
</section>
{% endblock %}
